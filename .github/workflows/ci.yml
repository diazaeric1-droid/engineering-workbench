name: ci

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    name: bootstrap + pytest (py3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Pinned: bluebonnet (well-performance-studio's physics engine) supports <= 3.11.
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements.txt
          pip install pytest
      # No explicit bootstrap step: the deterministic artifacts (ESP model + SCADA, the
      # gas-lift fleet) are COMMITTED, so a fresh checkout already has them. pytest's
      # session-scoped fixture calls core.bootstrap() once — idempotent, a fast no-op on
      # the committed artifacts (and a self-healing retrain only if one won't load). This
      # also makes CI exercise the real committed-artifact cold path instead of masking a
      # cold-start regression behind a pre-train step (audit: 'CI bootstraps twice').
      - name: Tests
        run: python -m pytest -q
