name: ci

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    name: bootstrap + pytest (py3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Pinned: bluebonnet (well-performance-studio's physics engine) supports <= 3.11.
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements.txt
          pip install pytest
      - name: Bootstrap (regenerate gitignored synthetic data + train the ESP model)
        run: python -c "import core; core.bootstrap()"
      - name: Tests
        run: python -m pytest -q
