name: smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          # bluebonnet supports Python 3.8-3.11 (NOT 3.14). Pin 3.11.
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Unit tests (deterministic wrappers)
        run: pytest -q

      - name: App renders without exception (AppTest)
        run: |
          python -c "from streamlit.testing.v1 import AppTest; at=AppTest.from_file('demo/app.py',default_timeout=300).run(); assert not at.exception, at.exception"
