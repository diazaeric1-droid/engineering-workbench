name: tests-and-eval-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: python -m pytest -q

      - name: Eval regression gate (strict blind-holdout agreement >= 0.70)
        run: python evals/check_gate.py --threshold 0.70
